name: CI

on:
  push:
    branches: [ main, copilot/** ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
    
    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: ~/.cargo/registry
        key: ubuntu-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Cache cargo index
      uses: actions/cache@v4
      with:
        path: ~/.cargo/git
        key: ubuntu-cargo-index-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Cache cargo build
      uses: actions/cache@v4
      with:
        path: target
        key: ubuntu-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Check formatting
      run: cargo fmt --all -- --check
    
    - name: Run clippy
      run: cargo clippy --workspace --all-targets --all-features -- -D warnings
    
    - name: Build
      run: cargo build --workspace --verbose --all-features
    
    - name: Run tests
      run: cargo test --workspace --verbose --all-features
    
    - name: Build documentation
      run: cargo doc --workspace --no-deps --all-features
    
    - name: Build benchmarks
      run: cargo build --workspace --benches
  
  coverage:
    name: Coverage Badges
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: llvm-tools-preview

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: ~/.cargo/registry
        key: ubuntu-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo index
      uses: actions/cache@v4
      with:
        path: ~/.cargo/git
        key: ubuntu-cargo-index-${{ hashFiles('**/Cargo.lock') }}

    - name: Install cargo-llvm-cov
      uses: taiki-e/install-action@cargo-llvm-cov

    - name: Generate coverage data
      run: cargo llvm-cov --all-features --workspace --json --summary-only --output-path coverage.json

    - name: Generate coverage badges
      run: bash scripts/generate-coverage-badges.sh coverage.json badges

    - name: Deploy badges to badges branch
      run: |
        cd badges
        git init
        git checkout -b badges
        git add -A
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git commit -m "Update coverage badges [skip ci]"
        git push --force "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" badges

  lean-verify:
    name: Lean Verification
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Install Lean4 (elan)
      run: |
        curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
        echo "$HOME/.elan/bin" >> $GITHUB_PATH

    - name: Cache Lake build
      uses: actions/cache@v4
      with:
        path: proofs/.lake
        key: lean-lake-${{ hashFiles('proofs/lean-toolchain', 'proofs/lakefile.lean') }}

    - name: Build Lean proofs
      run: cd proofs && lake build
