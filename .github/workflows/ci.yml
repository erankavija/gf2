name: CI

on:
  push:
    branches: [ main, copilot/** ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
    
    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: ~/.cargo/registry
        key: ubuntu-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Cache cargo index
      uses: actions/cache@v4
      with:
        path: ~/.cargo/git
        key: ubuntu-cargo-index-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Cache cargo build
      uses: actions/cache@v4
      with:
        path: target
        key: ubuntu-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Check formatting
      run: cargo fmt --all -- --check
    
    - name: Run clippy
      run: cargo clippy --workspace --all-targets --all-features -- -D warnings
    
    - name: Build
      run: cargo build --workspace --verbose --all-features
    
    - name: Run tests
      run: cargo test --workspace --verbose --all-features
    
    - name: Build documentation
      run: cargo doc --workspace --no-deps --all-features
    
    - name: Build benchmarks
      run: cargo build --workspace --benches
  
  coverage:
    name: Coverage Badges
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: llvm-tools-preview

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: ~/.cargo/registry
        key: ubuntu-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo index
      uses: actions/cache@v4
      with:
        path: ~/.cargo/git
        key: ubuntu-cargo-index-${{ hashFiles('**/Cargo.lock') }}

    - name: Install cargo-llvm-cov
      uses: taiki-e/install-action@cargo-llvm-cov

    - name: Generate coverage data
      run: cargo llvm-cov --all-features --workspace --json --summary-only --output-path coverage.json

    - name: Generate coverage badges
      run: bash scripts/generate-coverage-badges.sh coverage.json badges

    - name: Deploy badges to badges branch
      run: |
        cd badges
        git init
        git checkout -b badges
        git add -A
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git commit -m "Update coverage badges [skip ci]"
        git push --force "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" badges

  lean-verify:
    name: Lean Verification
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Install Lean4 (elan)
      run: |
        curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
        echo "$HOME/.elan/bin" >> $GITHUB_PATH

    - name: Install Rust nightly (for Charon)
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: nightly-2026-02-07
        components: rustc-dev, llvm-tools-preview, rust-src

    - name: Cache Charon binary
      id: cache-charon
      uses: actions/cache@v4
      with:
        path: ~/.cargo/bin/charon*
        key: charon-v0.1.173-nightly-2026-02-07

    - name: Install Charon
      if: steps.cache-charon.outputs.cache-hit != 'true'
      run: |
        cargo +nightly-2026-02-07 install --git https://github.com/AeneasVerif/charon \
          --rev 1a659e67b982e18da872dea26d4a7b3764dfe0c3 charon --locked

    - name: Install OCaml and Aeneas
      run: |
        sudo apt-get update && sudo apt-get install -y opam
        opam init --disable-sandboxing --no-setup --auto-setup --yes
        eval $(opam env)
        opam install ppx_deriving visitors easy_logging zarith yojson core_unix \
          odoc ocamlgraph menhir unionFind zarith progress domainslib dune --yes
        git clone --depth 1 https://github.com/AeneasVerif/aeneas.git /tmp/aeneas
        cd /tmp/aeneas && make setup-charon && make build-dev
        cp /tmp/aeneas/bin/aeneas ~/.cargo/bin/

    - name: Cache Lake build
      uses: actions/cache@v4
      with:
        path: proofs/.lake
        key: lean-lake-${{ hashFiles('proofs/lean-toolchain', 'proofs/lakefile.lean') }}

    - name: Run verification pipeline
      run: |
        eval $(opam env)
        ./scripts/verify-lean.sh

    - name: Verify generated files are up to date
      run: |
        git diff --exit-code proofs/Gf2Core/ || {
          echo "ERROR: Generated Lean files are out of date."
          echo "Run ./scripts/verify-lean.sh locally and commit the updated files."
          exit 1
        }
